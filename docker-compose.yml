services:
  srtla:
    build: .
    network_mode: host
    environment:
      - RELAY_TARGET_HOST=${RELAY_TARGET_HOST:?Set RELAY_TARGET_HOST to your ingest server}
      - RELAY_TARGET_SRT_PORT=${RELAY_TARGET_SRT_PORT:-8890}
      - RELAY_LISTEN_PORT=5000
      - RELAY_HEALTH_PORT=8080
      - RELAY_DNS_CHECK_INTERVAL=${RELAY_DNS_CHECK_INTERVAL:-30}
    restart: unless-stopped

  # Additional SRTLA listeners on separate ports.
  # Each port supports one concurrent stream. Add more as needed.
  srtla2:
    build: .
    network_mode: host
    environment:
      - RELAY_TARGET_HOST=${RELAY_TARGET_HOST}
      - RELAY_TARGET_SRT_PORT=${RELAY_TARGET_SRT_PORT:-8890}
      - RELAY_LISTEN_PORT=5001
      - RELAY_HEALTH_PORT=0
    restart: unless-stopped

  srtla3:
    build: .
    network_mode: host
    environment:
      - RELAY_TARGET_HOST=${RELAY_TARGET_HOST}
      - RELAY_TARGET_SRT_PORT=${RELAY_TARGET_SRT_PORT:-8890}
      - RELAY_LISTEN_PORT=5002
      - RELAY_HEALTH_PORT=0
    restart: unless-stopped

  srtla4:
    build: .
    network_mode: host
    environment:
      - RELAY_TARGET_HOST=${RELAY_TARGET_HOST}
      - RELAY_TARGET_SRT_PORT=${RELAY_TARGET_SRT_PORT:-8890}
      - RELAY_LISTEN_PORT=5003
      - RELAY_HEALTH_PORT=0
    restart: unless-stopped

  srtla5:
    build: .
    network_mode: host
    environment:
      - RELAY_TARGET_HOST=${RELAY_TARGET_HOST}
      - RELAY_TARGET_SRT_PORT=${RELAY_TARGET_SRT_PORT:-8890}
      - RELAY_LISTEN_PORT=5004
      - RELAY_HEALTH_PORT=0
    restart: unless-stopped

  # Optional: nginx TCP/UDP proxy for RTMP and raw SRT passthrough
  nginx-proxy:
    image: nginx:alpine
    network_mode: host
    environment:
      - RELAY_TARGET_HOST=${RELAY_TARGET_HOST}
    volumes:
      - ./nginx-relay.conf.template:/tmp/nginx-relay.conf.template:ro
    command: >
      /bin/sh -c "envsubst '$$RELAY_TARGET_HOST' < /tmp/nginx-relay.conf.template
      > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    restart: unless-stopped
